# golangci-lint v1 config (compatible with v2 via migrate). Install: https://golangci-lint.run/welcome/install/
run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - dupl
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck

linters-settings:
  gocyclo:
    min-complexity: 18
  revive:
    severity: warning
    rules:
      # Avoid forcing doc comments on every exported symbol for this codebase.
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
